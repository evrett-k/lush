name: lush
version: 0.1.0
section: shells
priority: optional
maintainer: "Your Name <you@example.com>"
description: "A Lua-powered shell"
license: GPL-3.0
formats:
  deb:
    file: "dist/lush_{{ .Version }}_linux-{{ .Arch }}.deb"
  rpm:
    file: "dist/lush-{{ .Version }}-1.linux-{{ .Arch }}.rpm"
  apk:
    file: "dist/lush-{{ .Version }}-linux-{{ .Arch }}.apk"
contents:
  - src: dist/bin/linux/{{ .Arch }}/lush
    dst: /usr/bin/lush
  - src: dist/bin/linux/{{ .Arch }}/lush-lsp
    dst: /usr/bin/lush-lsp
