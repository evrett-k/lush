name: CI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Release Artifacts
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            targets: "linux-static-amd64 linux-static-x86 linux-static-arm64 appimage"
          - os: macos-latest
            targets: "macos-pkg macos-dmg brew procursus-arm64 procursus-amd64"
          - os: windows-latest
            targets: "windows-portable windows32-portable windows-arm64-portable"
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build Artifacts
        shell: bash
        run: |
          chmod +x build.sh
          for target in ${{ matrix.targets }}; do
            ./build.sh "$target" || echo "Warning: $target failed"
          done
          cargo build -p lush-lsp --release
      - name: Package VS Code Extension
        if: matrix.os == 'macos-latest'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install and Package VSIX
        if: matrix.os == 'macos-latest'
        shell: bash
        working-directory: editors/vscode
        run: |
          npm install -g @vscode/vsce
          vsce package
          mkdir -p ../../dist
          mv *.vsix ../../dist/
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            target/*/release/lush
            target/*/release/lush.exe
