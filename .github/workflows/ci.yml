name: CI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Release Artifacts
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            targets: "package"
          - os: windows-latest
            targets: "windows-portable"
          - os: macos-latest
            targets: "macos-pkg macos-dmg brew"
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl,x86_64-pc-windows-msvc,aarch64-apple-darwin,x86_64-apple-darwin
      - name: Install Tools
        shell: bash
        continue-on-error: true
        run: |
          cargo install cross || echo "Cross already installed"
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            curl -sfL https://install.goreleaser.com/github.com/goreleaser/nfpm.sh | sh
          fi
      - name: Build and Package
        shell: bash
        run: |
          chmod +x build.sh
          for target in ${{ matrix.targets }}; do
            ./build.sh "$target" || echo "Warning: $target failed"
          done
          cargo build -p lush-lsp --release
      - name: Package VS Code Extension
        if: matrix.os == 'macos-latest'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install and Package VSIX
        if: matrix.os == 'macos-latest'
        shell: bash
        working-directory: editors/vscode
        run: |
          npm install -g @vscode/vsce
          vsce package
          mkdir -p ../../dist
          mv *.vsix ../../dist/
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            target/*/release/lush
            target/*/release/lush.exe
            target/release/lush-lsp*
