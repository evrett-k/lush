name: CI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Release Artifacts
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build Artifacts
        shell: bash
        run: |
          chmod +x build.sh github-build.sh
          ./github-build.sh
          cargo build -p lush-lsp --release
      - name: Package VS Code Extension
        if: matrix.os == 'macos-latest'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install and Package VSIX
        if: matrix.os == 'macos-latest'
        shell: bash
        working-directory: editors/vscode
        run: |
          npm install -g @vscode/vsce
          vsce package
          mkdir -p ../../dist
          mv *.vsix ../../dist/
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            target/release/lush*
            target/release/*.exe
            target/*/release/lush*
